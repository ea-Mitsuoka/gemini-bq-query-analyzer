main:
  params: [event]
  steps:
    - init:
        assign:
          - arg: $${event}
          - project_id: $${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "${region}"
          - job_name: "${job_name}"
    - run_pipeline:
        try:
          steps:
            - debug_log:
                call: sys.log
                args:
                  data: $${arg}
            - run_job:
                call: googleapis.run.v2.projects.locations.jobs.run
                args:
                  name: $${"projects/" + project_id + "/locations/" + region + "/jobs/" + job_name}
                  body:
                    overrides:
                      containerOverrides:
                        - env:
                            - name: CUSTOMER_PROJECT_ID
                              value: $${arg.customer_project_id}
                            - name: GCS_BUCKET_NAME
                              value: $${arg.gcs_bucket_name}
                            - name: WORST_QUERY_LIMIT
                              value: $${arg.worst_query_limit}
                            - name: TIME_RANGE_INTERVAL
                              value: $${arg.time_range_interval}
                result: job_execution
            - wait_for_job:
                call: googleapis.run.v2.projects.locations.jobs.executions.get
                args:
                  name: $${job_execution.name}
                result: execution_status
            - check_condition:
                switch:
                  - condition: $${not(default(execution_status.done, false))}
                    next: sleep_and_poll
                next: check_job_result
            - sleep_and_poll:
                call: sys.sleep
                args:
                  seconds: 30
                next: wait_for_job
            - check_job_result:
                switch:
                  - condition: $${default(execution_status.failedCount, 0) > 0}
                    next: raise_job_failure
                next: get_report_json
            - raise_job_failure:
                raise: $${"Cloud Run Job did not succeed: " + job_execution.name}
            - get_report_json:
                try:
                  call: http.get
                  args:
                    url: $${"https://storage.googleapis.com/download/storage/v1/b/" + arg.gcs_bucket_name + "/o/results%2Fsummary.json?alt=media"}
                    auth:
                      type: OAuth2
                  result: report_json
                retry:
                  predicate: $${http.default_retry_predicate}
                  max_retries: 5
                  backoff:
                    initial_delay: 2
                    max_delay: 10
                    multiplier: 2
            - check_slack:
                switch:
                  - condition: $${arg.slack_webhook_secret_name != ""}
                    next: get_slack_url
                next: end
            - get_slack_url:
                call: googleapis.secretmanager.v1.projects.secrets.versions.access
                args:
                  name: $${"projects/" + project_id + "/secrets/" + arg.slack_webhook_secret_name + "/versions/latest"}
                result: secret_response
            - decode_slack_url:
                assign:
                  - slack_url: $${text.decode(base64.decode(secret_response.payload.data))}
            - notify_slack:
                call: http.post
                args:
                  url: $${slack_url}
                  body:
                    text: $${"✅ BQ分析完了 [" + arg.tenant_id + "]\n" + report_json.body.text_summary + "\nレポート: " + report_json.body.report_url}
        except:
          as: e
          steps:
            - log_failure:
                call: sys.log
                args:
                  severity: ERROR
                  text: $${"ANALYZER_FAILURE tenant=" + default(map.get(arg, "tenant_id"), "unknown") + " customer=" + default(map.get(arg, "customer_project_id"), "unknown") + " error=" + json.encode_to_string(e)}
            - reraise:
                raise: $${e}
