name: "Manual Deploy"

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --no-dev

      # 1. backend(tfstate)バケットを冪等に用意し、deployer SA に権限付与
      - name: Ensure state bucket
        run: uv run python tools/ensure_state_bucket.py

      # 2. GCSからテナント設定を取得して各種設定ファイルを生成
      - name: Generate Configs from GCS
        run: uv run python tools/generate_configs.py

      # 3. 生成された設定ファイルの保存
      - name: Upload Config Files as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: deployment-configs
          path: |
            env.txt
            terraform/terraform.tfvars
            terraform/backend.tf
          retention-days: 1

      # 4. Terraformセットアップ（.terraform-version と同じバージョンに固定）
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"

      # 5. Terraform Init & Apply
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
