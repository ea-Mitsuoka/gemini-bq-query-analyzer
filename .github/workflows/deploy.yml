name: "Manual Deploy from Spreadsheet"

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. スプレッドシートからの設定生成
      - name: Generate Configs from Spreadsheet
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python tools/generate_configs.py

      # 2. 生成された設定ファイルの保存
      - name: Upload Config Files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-configs
          path: |
            .env
            terraform/terraform.tfvars
          retention-days: 1

      # 3. Terraformセットアップ
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4. 【重要】認証JSONを一時ファイルとして書き出し、環境変数をセット
      - name: Terraform Init & Apply
        shell: bash
        env:
          # JSON文字列をそのまま渡す
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # JSONを一時ファイルに保存
          echo "$GOOGLE_CREDENTIALS_JSON" > "${{ github.workspace }}/gcp-key.json"

          # 環境変数としてファイルの絶対パスを指定
          export GOOGLE_APPLICATION_CREDENTIALS="${{ github.workspace }}/gcp-key.json"

          cd terraform
          terraform init

          # apply実行。内部のlocal-execが上記環境変数を自動で読み取る
          terraform apply -auto-approve